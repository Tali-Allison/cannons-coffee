<main>
  <form id="form">
    <h1>Inquiry Form</h1><br>
    <label for="name">Name:</label><br>
    <input type="text" id="name" name="name" placeholder="type here" required><br><br>

    <label for="email">Email:</label><br>
    <input type="text" id="email" name="email" placeholder="type here" required><br><br>

    <label for="phonenumber">Phone Number:</label><br>
    <input type="text" id="phoneNumber" name="phoneNumber" placeholder="type here" required><br><br>

    <label for="comments">Comments:</label><br>
    <textarea id="comments" name="comments" rows="4" cols="40" placeholder="type here"></textarea><br><br>

    <label for="coffeeFlavor">Choose a Coffee Flavor:</label><br>
    <select id="coffeeFlavor" name="coffeeFlavor">
      <option value="">Select a Flavor</option>
      <option value="original">Original ☕️ </option>
      <option value="iced carmel">Iced Carmel 🧋</option>
      <option value="pumpkin spice">Pumpkin Spice 🎃</option>
    </select><br><br>

    <div class="interest" name="interest">
      <legend>Are you interested in:</legend><br>
      <label><input type="radio" name="interest" value="buying coffee">Buying Coffee</label><br><br>
      <label><input type="radio" name="interest" value="employment">Employment</label><br><br>
    </div>

    <button type="submit">Submit</button>

  </form>
  <div class="container">

  </div>
</main>
